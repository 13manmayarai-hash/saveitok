<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — SaveItOk</title>
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080C14; --text: #EEF0F5; --muted2: #8892A4;
  --blue: #3B82F6; --blue2: #60A5FA;
  --grad: linear-gradient(135deg, #3B82F6 0%, #22D3EE 100%);
  --ff-head: 'Space Grotesk', sans-serif; --ff-body: 'Inter', sans-serif;
}
body {
  background: var(--bg); color: var(--text); font-family: var(--ff-body);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.wrap { max-width: 440px; }
.code {
  font-family: var(--ff-head); font-weight: 800; font-size: 6rem;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
}
h1 { font-family: var(--ff-head); font-size: 1.5rem; font-weight: 700; margin: 12px 0 8px; }
p { color: var(--muted2); font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
a.btn {
  display: inline-block; background: var(--grad); color: #fff;
  font-family: var(--ff-head); font-weight: 700; font-size: 14px;
  text-decoration: none; padding: 12px 28px; border-radius: 12px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back to downloading videos.</p>
  <a href="/" class="btn">Back to SaveItOk</a>
</div>
</body>
</html>
