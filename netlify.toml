[build]
  functions = "netlify/functions"

# API routes → serverless functions
[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200

# Real 404s for unknown pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
